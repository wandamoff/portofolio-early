<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kubus Project - Early Dwika</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  </head>
  <body class="bg-[#020617] text-white selection:bg-blue-500/30">
    <nav class="fixed top-0 left-0 w-full z-50 p-6 md:p-10 pointer-events-none">
      <a
        href="index.html#portfolio"
        class="pointer-events-auto inline-flex items-center gap-3 px-6 py-3 bg-[#0b1120]/80 backdrop-blur-md border border-gray-800 rounded-full text-gray-400 hover:text-blue-400 hover:border-blue-500/50 transition-all group shadow-2xl"
      >
        <i
          class="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"
        ></i>
        <span class="text-xs font-black uppercase tracking-[0.2em]">Back</span>
      </a>
    </nav>

    <header class="max-w-7xl mx-auto px-6 pt-32 pb-16">
      <div class="max-w-3xl" data-aos="fade-up">
        <h1
          class="text-6xl md:text-8xl font-black uppercase tracking-tighter leading-none mb-6"
        >
          Kubus<span class="text-blue-500">.</span>
        </h1>
        <div class="flex flex-wrap gap-3 mb-8">
          <span
            class="px-4 py-1.5 rounded-full border border-blue-500/20 bg-blue-500/5 text-blue-400 text-[10px] font-black uppercase tracking-widest"
            >Branding</span
          >
          <span
            class="px-4 py-1.5 rounded-full border border-gray-800 bg-gray-900/50 text-gray-400 text-[10px] font-black uppercase tracking-widest"
            >Graphic Design</span
          >
        </div>
        <p class="text-gray-400 text-lg md:text-xl leading-relaxed font-medium">
          Created graphic design materials and visual assets to support the
          organization's branding and communication across digital platforms.
        </p>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-32">
      <div class="columns-1 md:columns-2 lg:columns-3 gap-6 space-y-6">
        <div
          class="break-inside-avoid rounded-3xl overflow-hidden border border-gray-800 group"
          data-aos="fade-up"
        >
          <img
            src="asset/kubus1.jpeg"
            alt="Kubus Project 1"
            class="w-full h-auto group-hover:scale-105 transition-transform duration-700"
          />
        </div>

        <div
          class="break-inside-avoid rounded-3xl overflow-hidden border border-gray-800 group"
          data-aos="fade-up"
          data-aos-delay="100"
        >
          <img
            src="asset/kubus2.png"
            alt="Kubus Project 2"
            class="w-full h-auto group-hover:scale-105 transition-transform duration-700"
          />
        </div>

        <div
          class="break-inside-avoid rounded-3xl overflow-hidden border border-gray-800 group"
          data-aos="fade-up"
          data-aos-delay="200"
        >
          <img
            src="asset/kubus3.png"
            alt="Kubus Project 3"
            class="w-full h-auto group-hover:scale-105 transition-transform duration-700"
          />
        </div>

        <div
          class="break-inside-avoid rounded-3xl overflow-hidden border border-gray-800 group"
          data-aos="fade-up"
          data-aos-delay="300"
        >
          <img
            src="asset/kubus4.png"
            alt="Kubus Project 4"
            class="w-full h-auto group-hover:scale-105 transition-transform duration-700"
          />
        </div>

        <div
          class="break-inside-avoid rounded-3xl overflow-hidden border border-gray-800 group"
          data-aos="fade-up"
          data-aos-delay="400"
        >
          <img
            src="asset/kubus5.png"
            alt="Kubus Project 5"
            class="w-full h-auto group-hover:scale-105 transition-transform duration-700"
          />
        </div>

        <div
          class="break-inside-avoid rounded-3xl overflow-hidden border border-gray-800 group"
          data-aos="fade-up"
          data-aos-delay="400"
        >
          <img
            src="asset/kubus6.jpeg"
            alt="Kubus Project 6"
            class="w-full h-auto group-hover:scale-105 transition-transform duration-700"
          />
        </div>

        <div
          class="break-inside-avoid rounded-3xl overflow-hidden border border-gray-800 group"
          data-aos="fade-up"
          data-aos-delay="400"
        >
          <img
            src="asset/kubus7.jpeg"
            alt="Kubus Project 7"
            class="w-full h-auto group-hover:scale-105 transition-transform duration-700"
          />
        </div>

        <div
          class="break-inside-avoid rounded-3xl overflow-hidden border border-gray-800 group"
          data-aos="fade-up"
          data-aos-delay="400"
        >
          <img
            src="asset/kubus8.jpeg"
            alt="Kubus Project 8"
            class="w-full h-auto group-hover:scale-105 transition-transform duration-700"
          />
        </div>
      </div>
    </main>

    <footer class="py-20 text-center border-t border-gray-900">
      <p
        class="text-gray-600 text-[10px] font-black uppercase tracking-[0.3em]"
      >
        © 2026 Early Dwika Prayitno
      </p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({ duration: 1000, once: true });
    </script>
  </body>
</html>
